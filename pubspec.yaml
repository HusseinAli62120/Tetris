name: tetris
description: "A new Flutter project."
publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ^3.10.4

dependencies:
  flutter:
    sdk: flutter
  flutter_animate: ^4.5.2
  flutter_launcher_icons: ^0.14.4
  flutter_native_splash: ^2.4.7
  hive: ^2.2.3
  hive_flutter: ^1.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/

flutter_native_splash:
  image: assets/appIcon.png
  image_dark: assets/appIcon.png
  branding: "assets/brandingLight.png"
  branding_dark: "assets/brandingDark.png"
  color: "#fafafa" #light mode background color
  color_dark: "#0a0a0a" #dark mode background color
  android: true
  fullscreen: true # Hide status bar
  ios: true
  android_12:
    image: assets/appIcon.png
    image_dark: assets/appIcon.png
    color_dark: "#0a0a0a"
    color: "#fafafa"
    fullscreen: true
    branding: "assets/brandingLight.png"
    branding_dark: "assets/brandingDark.png"

flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/appStore.png"
  remove_alpha_ios: true
  min_sdk_android: 21
